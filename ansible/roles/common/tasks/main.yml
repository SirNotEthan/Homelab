---
- name: Verify the managed operating system
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family == "Debian"
      - ansible_facts.distribution == "Ubuntu"
    fail_msg: >-
      The common role currently supports Ubuntu only; refusing to modify
      {{ ansible_facts.distribution }}.

- name: Set the system hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Set the local timezone link
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ homelab_timezone }}"
    dest: /etc/localtime
    state: link
    force: true

- name: Record the configured timezone
  ansible.builtin.copy:
    content: "{{ homelab_timezone }}\n"
    dest: /etc/timezone
    owner: root
    group: root
    mode: "0644"

- name: Install common administration packages
  ansible.builtin.apt:
    name: "{{ homelab_common_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Apply all available package upgrades
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  when: homelab_apply_full_upgrade | bool

- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Apply managed kernel tuning
  ansible.builtin.template:
    src: 90-homelab-sysctl.conf.j2
    dest: /etc/sysctl.d/90-homelab.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl settings

- name: Enable chrony time synchronisation
  ansible.builtin.systemd_service:
    name: chrony.service
    enabled: true
    state: started
  # A fresh-host check run predicts the package installation without actually
  # creating the service unit. Skip only that impossible service preview.
  when: not ansible_check_mode or "chrony" in ansible_facts.packages

- name: Configure unattended security updates
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
  when: homelab_unattended_upgrades | bool

- name: Install the managed SSH policy
  ansible.builtin.template:
    src: 00-homelab.conf.j2
    dest: /etc/ssh/sshd_config.d/00-homelab.conf
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -t -f %s
  notify: Validate and reload SSH
  when: homelab_manage_ssh | bool

- name: Remove the superseded SSH policy filename
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/99-homelab.conf
    state: absent
  notify: Validate and reload SSH
  when: homelab_manage_ssh | bool
