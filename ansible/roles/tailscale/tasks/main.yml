---
- name: Verify the managed operating system
  ansible.builtin.assert:
    that:
      - ansible_facts.distribution == "Ubuntu"
      - ansible_facts.distribution_release | length > 0
    fail_msg: The Tailscale role currently supports Ubuntu only.

- name: Create the APT keyring directory
  ansible.builtin.file:
    path: "{{ tailscale_keyring_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check for an existing Tailscale repository definition
  ansible.builtin.stat:
    path: "{{ tailscale_repository_path }}"
  register: tailscale_repository

- name: Check for an existing Tailscale repository signing key
  ansible.builtin.stat:
    path: "{{ tailscale_keyring_path }}"
  register: tailscale_keyring

- name: Install the Tailscale repository signing key
  ansible.builtin.get_url:
    url: >-
      https://pkgs.tailscale.com/{{ tailscale_package_track }}/ubuntu/
      {{- ansible_facts.distribution_release }}.noarmor.gpg
    dest: "{{ tailscale_keyring_path }}"
    owner: root
    group: root
    mode: "0644"
  # get_url reports a false change for existing downloads in check mode because
  # it cannot compare their full remote content without downloading it.
  when: not ansible_check_mode or not tailscale_keyring.stat.exists

- name: Install the official Tailscale repository definition
  ansible.builtin.get_url:
    url: >-
      https://pkgs.tailscale.com/{{ tailscale_package_track }}/ubuntu/
      {{- ansible_facts.distribution_release }}.tailscale-keyring.list
    dest: "{{ tailscale_repository_path }}"
    owner: root
    group: root
    mode: "0644"
  when: not ansible_check_mode or not tailscale_repository.stat.exists

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
  # On a fresh host, check mode predicts the repository file without creating
  # it, so APT cannot yet resolve the package. A real run installs it normally.
  when: not ansible_check_mode or tailscale_repository.stat.exists

- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Enable the Tailscale daemon
  ansible.builtin.systemd_service:
    name: tailscaled.service
    enabled: true
    state: started
  when: not ansible_check_mode or "tailscale" in ansible_facts.packages
