apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: identity-authentik
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: 2026.5.4
      helm:
        releaseName: authentik
        valueFiles:
          - $values/kubernetes/platform/identity/authentik-values.yaml
    - repoURL: https://github.com/SirNotEthan/Homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: identity
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
