apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SirNotEthan/Homelab.git
    targetRevision: main
    path: kubernetes/platform/monitoring/secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
