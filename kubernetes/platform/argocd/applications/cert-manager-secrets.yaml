apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SirNotEthan/Homelab.git
    targetRevision: main
    path: kubernetes/infrastructure/cert-manager/secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
