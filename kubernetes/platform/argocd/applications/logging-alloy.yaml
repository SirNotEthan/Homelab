apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logging-alloy
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.10.1
      helm:
        releaseName: alloy
        valueFiles:
          - $values/kubernetes/platform/logging/alloy-values.yaml
    - repoURL: https://github.com/SirNotEthan/Homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
