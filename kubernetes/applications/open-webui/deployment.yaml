apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      nodeSelector:
        homelab.sirnotethan.uk/workload: ai
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          env:
            - name: WEBUI_NAME
              value: Homelab AI
            - name: WEBUI_URL
              value: https://ai.apps.lab.sirnotethan.uk
            - name: OLLAMA_BASE_URL
              value: http://ollama.ai.svc.cluster.local:11434
            - name: ENABLE_OPENAI_API
              value: "false"
            - name: DEFAULT_MODELS
              value: qwen2.5-coder:1.5b
            - name: DEFAULT_LOCALE
              value: en
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: open-webui-data
              mountPath: /app/backend/data
      volumes:
        - name: open-webui-data
          persistentVolumeClaim:
            claimName: open-webui-data
