apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Homelab Core · Steward</title>
        <style>
          :root {
            --bg: #030807;
            --panel: rgba(9, 16, 14, 0.82);
            --panel-soft: rgba(14, 25, 22, 0.58);
            --line: rgba(189, 181, 139, 0.13);
            --line-bright: rgba(224, 196, 118, 0.38);
            --text: #eef4df;
            --muted: #8a9a91;
            --dim: #586760;
            --teal: #71d7c7;
            --aqua: #b9fff2;
            --amber: #e2af52;
            --gold: #f4dfaa;
            --green: #82d7a6;
            --danger: #d46a5d;
            --shadow: 0 18px 70px rgba(0, 0, 0, 0.46);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          }

          * {
            box-sizing: border-box;
          }

          body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
              radial-gradient(circle at 48% 21%, rgba(40, 82, 70, 0.23), transparent 31%),
              radial-gradient(circle at 76% 78%, rgba(122, 76, 33, 0.12), transparent 33%),
              linear-gradient(180deg, #050908 0%, #020504 100%);
            overflow: hidden;
          }

          body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
              linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
              linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(circle at 50% 40%, black, transparent 76%);
          }

          .app {
            display: grid;
            grid-template-columns: 88px 1fr 354px;
            grid-template-rows: 86px 1fr;
            height: 100vh;
          }

          header {
            grid-column: 1 / 4;
            display: grid;
            grid-template-columns: 320px 1fr 360px;
            align-items: center;
            border-bottom: 1px solid var(--line);
            background: rgba(2, 7, 6, 0.74);
            backdrop-filter: blur(20px);
            padding: 0 22px;
          }

          .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            letter-spacing: 0.02em;
          }

          .mark {
            width: 24px;
            height: 24px;
            transform: rotate(45deg);
            background: linear-gradient(135deg, var(--gold), #98dcb9);
            box-shadow: 0 0 28px rgba(226, 175, 82, 0.34);
          }

          .brand strong,
          .panel-title,
          .card h3,
          aside h2 {
            font-family: "SF Pro Display", Inter, ui-sans-serif, system-ui, sans-serif;
            font-weight: 750;
          }

          .brand small,
          .subtle,
          .mono,
          .timeline,
          .nav span {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
          }

          .brand small {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 10px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
          }

          .command {
            justify-self: center;
            width: min(760px, 72%);
            height: 42px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 14px;
            border: 1px solid rgba(166, 211, 194, 0.18);
            border-radius: 14px;
            background: rgba(9, 16, 14, 0.8);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 0 32px rgba(113, 215, 199, 0.04);
            color: var(--muted);
          }

          .command .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--teal);
            box-shadow: 0 0 18px var(--teal);
          }

          .top-status {
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--muted);
          }

          .chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 26px;
            border: 1px solid rgba(113, 215, 199, 0.24);
            border-radius: 999px;
            padding: 0 12px;
            background: rgba(27, 56, 49, 0.36);
            color: #baf5db;
            font-size: 12px;
          }

          .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 12px currentColor;
          }

          nav {
            grid-row: 2;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            padding-top: 18px;
            border-right: 1px solid var(--line);
            background: rgba(3, 8, 7, 0.76);
          }

          .nav {
            width: 62px;
            height: 58px;
            border: 1px solid transparent;
            border-radius: 16px;
            display: grid;
            place-items: center;
            gap: 3px;
            color: var(--dim);
            background: transparent;
            cursor: pointer;
          }

          .nav.active {
            color: var(--gold);
            border-color: rgba(226, 175, 82, 0.28);
            background: radial-gradient(circle at 50% 20%, rgba(226, 175, 82, 0.2), rgba(226, 175, 82, 0.04));
            box-shadow: inset 3px 0 0 rgba(226, 175, 82, 0.85), 0 0 28px rgba(226, 175, 82, 0.11);
          }

          .nav i {
            width: 15px;
            height: 15px;
            display: block;
            border-radius: 4px;
            background: currentColor;
            opacity: 0.9;
          }

          .nav span {
            font-size: 9px;
          }

          main {
            grid-row: 2;
            padding: 18px 18px 22px 18px;
            overflow: hidden;
          }

          .screen {
            display: none;
            height: 100%;
            grid-template-rows: minmax(360px, 1.35fr) 270px 74px;
            gap: 16px;
          }

          .screen.active {
            display: grid;
          }

          .panel,
          .card,
          aside,
          .timeline-card {
            border: 1px solid var(--line);
            border-radius: 18px;
            background:
              linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.006)),
              var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(22px);
          }

          .panel {
            position: relative;
            overflow: hidden;
            min-height: 0;
          }

          .panel::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            background:
              radial-gradient(circle at 48% 47%, rgba(244, 223, 170, 0.17), transparent 24%),
              radial-gradient(circle at 55% 44%, rgba(113, 215, 199, 0.08), transparent 34%);
          }

          .panel-head {
            position: absolute;
            top: 18px;
            left: 22px;
            z-index: 4;
          }

          .panel-title {
            margin: 0;
            font-size: 15px;
          }

          .subtle {
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 0.08em;
          }

          .legend {
            position: absolute;
            z-index: 4;
            top: 18px;
            right: 22px;
            display: flex;
            gap: 16px;
            color: var(--muted);
            font-size: 11px;
          }

          .core-stage {
            position: absolute;
            inset: 0;
            perspective: 980px;
            transform-style: preserve-3d;
          }

          .core {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 470px;
            height: 470px;
            transform: translate(-50%, -50%) rotateX(63deg) rotateZ(-12deg);
            transform-style: preserve-3d;
          }

          .core::before,
          .core::after {
            content: "";
            position: absolute;
            inset: 50%;
            width: 170px;
            height: 170px;
            transform: translate(-50%, -50%) rotateX(-63deg);
            border-radius: 50%;
            background:
              radial-gradient(circle at 40% 35%, #fff7d7, #f2d790 34%, rgba(226, 175, 82, 0.42) 58%, transparent 72%);
            box-shadow:
              0 0 35px #fff2bd,
              0 0 110px rgba(226, 175, 82, 0.42),
              0 0 220px rgba(113, 215, 199, 0.1);
          }

          .core::after {
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(244, 223, 170, 0.1), transparent 64%);
            box-shadow: none;
            animation: breathe 5s ease-in-out infinite;
          }

          .ring {
            position: absolute;
            inset: 50%;
            width: var(--s);
            height: var(--s);
            margin: calc(var(--s) / -2);
            border-radius: 50%;
            border: 1px solid rgba(244, 223, 170, 0.18);
            box-shadow: 0 0 34px rgba(226, 175, 82, 0.12), inset 0 0 24px rgba(113, 215, 199, 0.05);
            transform: rotateX(var(--rx)) rotateY(var(--ry)) rotateZ(var(--rz));
          }

          .ring::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: rgba(244, 223, 170, 0.78);
            border-right-color: rgba(113, 215, 199, 0.18);
            filter: blur(0.3px);
            animation: orbit 12s linear infinite;
          }

          .particle {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--p);
            height: var(--p);
            margin: calc(var(--p) / -2);
            border-radius: 50%;
            background: var(--c);
            box-shadow: 0 0 16px var(--c), 0 0 34px rgba(244, 223, 170, 0.14);
            transform:
              rotateZ(var(--a))
              translateX(var(--r))
              rotateZ(calc(-1 * var(--a)))
              translateZ(var(--z));
          }

          .label {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(var(--x), var(--y));
            color: var(--muted);
            font-size: 10px;
            text-shadow: 0 0 12px rgba(0, 0, 0, 0.8);
            z-index: 3;
          }

          .label.strong {
            color: #ecedd9;
          }

          .active-path {
            position: absolute;
            left: 24%;
            top: 63%;
            width: 380px;
            height: 68px;
            border-bottom: 4px solid rgba(226, 175, 82, 0.7);
            border-radius: 50%;
            filter: drop-shadow(0 0 10px rgba(226, 175, 82, 0.55));
            transform: rotate(-3deg);
            z-index: 2;
          }

          .active-path::after {
            content: "";
            position: absolute;
            right: 18%;
            bottom: -7px;
            width: 18px;
            height: 8px;
            border-radius: 999px;
            background: #fff2bd;
            box-shadow: 0 0 18px #f4dfaa;
            animation: pulsepath 2.4s ease-in-out infinite;
          }

          .inspector {
            position: absolute;
            z-index: 5;
            right: 26px;
            bottom: 26px;
            width: 295px;
            padding: 14px;
            border: 1px solid rgba(226, 175, 82, 0.22);
            border-radius: 16px;
            background: rgba(8, 13, 12, 0.76);
            box-shadow: 0 0 42px rgba(226, 175, 82, 0.08);
          }

          .inspector h3 {
            margin: 0 0 8px 0;
            font-size: 13px;
            color: var(--gold);
          }

          .kv {
            display: grid;
            grid-template-columns: 92px 1fr;
            gap: 5px 10px;
            color: var(--muted);
            font-size: 11px;
          }

          .kv b {
            color: #eaf5df;
            font-weight: 600;
          }

          .cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            min-height: 0;
          }

          .card {
            padding: 18px;
            overflow: hidden;
          }

          .card h3 {
            margin: 0 0 12px;
            font-size: 14px;
          }

          .status {
            float: right;
            color: var(--green);
            font-size: 10px;
            text-transform: uppercase;
          }

          .card p,
          .card li {
            color: #b8c7be;
            font-size: 12px;
            line-height: 1.85;
            margin: 0;
          }

          .bar {
            height: 5px;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.07);
            overflow: hidden;
            margin: 9px 0;
          }

          .bar span {
            display: block;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--teal), var(--amber));
          }

          .timeline {
            display: flex;
            gap: 12px;
            overflow: hidden;
          }

          .timeline-card {
            min-width: 230px;
            padding: 12px 14px;
            font-size: 11px;
            color: #d9e5d6;
          }

          aside {
            grid-row: 2;
            padding: 20px 18px;
            border-radius: 0;
            border-top: 0;
            border-right: 0;
            border-bottom: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: linear-gradient(180deg, rgba(10, 19, 17, 0.88), rgba(10, 7, 4, 0.9));
          }

          aside h2 {
            margin: 0;
          }

          .notice,
          .message {
            border-radius: 14px;
            padding: 14px;
            font-size: 12px;
            line-height: 1.55;
          }

          .notice {
            border: 1px solid rgba(226, 175, 82, 0.34);
            color: var(--gold);
            background: rgba(75, 45, 12, 0.23);
          }

          .message {
            border: 1px solid rgba(113, 215, 199, 0.24);
            background: rgba(15, 55, 47, 0.22);
            margin-top: auto;
          }

          .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
          }

          button {
            border: 1px solid rgba(189, 181, 139, 0.15);
            color: #edf7df;
            border-radius: 10px;
            background: rgba(9, 16, 14, 0.75);
            min-height: 32px;
            cursor: pointer;
          }

          .wide {
            grid-column: 1 / 3;
          }

          .input-row {
            display: flex;
            gap: 8px;
          }

          input {
            flex: 1;
            min-height: 34px;
            border-radius: 9px;
            border: 1px solid rgba(189, 181, 139, 0.15);
            background: rgba(9, 16, 14, 0.8);
            color: var(--text);
            padding: 0 12px;
          }

          .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 1fr 1fr;
            gap: 14px;
          }

          .library {
            display: grid;
            grid-template-rows: 40px 1fr;
            gap: 14px;
          }

          table {
            width: 100%;
            border-collapse: collapse;
            color: #dbe8d9;
            font-size: 13px;
          }

          th,
          td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(189, 181, 139, 0.08);
            text-align: left;
          }

          th {
            color: var(--muted);
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
          }

          @keyframes orbit {
            to {
              transform: rotate(360deg);
            }
          }

          @keyframes breathe {
            50% {
              opacity: 0.42;
              transform: translate(-50%, -50%) rotateX(-63deg) scale(1.08);
            }
          }

          @keyframes pulsepath {
            50% {
              right: 45%;
              opacity: 0.75;
            }
          }

          @media (max-width: 1200px) {
            .app {
              grid-template-columns: 72px 1fr;
            }

            aside {
              display: none;
            }

            header {
              grid-column: 1 / 3;
              grid-template-columns: 240px 1fr;
            }

            .top-status {
              display: none;
            }
          }
        </style>
      </head>
      <body>
        <div class="app">
          <header>
            <div class="brand">
              <div class="mark"></div>
              <div>
                <strong>Homelab Core</strong>
                <small>Steward · Private AI Command Center</small>
              </div>
            </div>
            <div class="command"><span class="pulse"></span><span>Ask, search, command, diagnose...</span><span style="margin-left:auto" class="subtle">⌘K</span></div>
            <div class="top-status">
              <span class="mono">00:30</span>
              <span class="chip"><span class="dot"></span>All systems nominal</span>
              <span class="chip" style="color:var(--amber);border-color:rgba(226,175,82,.25)">1</span>
              <span class="chip" style="background:#c9e9b9;color:#0c1712">S</span>
            </div>
          </header>

          <nav>
            <button class="nav active" data-screen="overview"><i></i><span>Overview</span></button>
            <button class="nav" data-screen="ai-core"><i></i><span>AI Core</span></button>
            <button class="nav"><i></i><span>Infra</span></button>
            <button class="nav"><i></i><span>Apps</span></button>
            <button class="nav"><i></i><span>Home</span></button>
            <button class="nav"><i></i><span>GitOps</span></button>
            <button class="nav" data-screen="memory"><i></i><span>Memory</span></button>
          </nav>

          <main>
            <section id="overview" class="screen active">
              <div class="panel">
                <div class="panel-head">
                  <h1 class="panel-title">Steward — Intelligence Core</h1>
                  <div class="subtle">a living orbital map of what Steward knows, trusts, and is reasoning about</div>
                  <div class="chip" style="margin-top:8px;color:var(--amber);border-color:rgba(226,175,82,.32)">Active reasoning · Home Assistant rollout</div>
                </div>
                <div class="legend"><span><span class="dot" style="color:var(--aqua)"></span> Cognitive</span><span><span class="dot" style="color:var(--teal)"></span> Operational</span><span><span class="dot" style="color:var(--amber)"></span> Peripheral</span></div>
                <div class="core-stage">
                  <div class="active-path"></div>
                  <div class="core">
                    <div class="ring" style="--s:260px;--rx:78deg;--ry:12deg;--rz:8deg"></div>
                    <div class="ring" style="--s:350px;--rx:54deg;--ry:-28deg;--rz:54deg"></div>
                    <div class="ring" style="--s:430px;--rx:70deg;--ry:44deg;--rz:-34deg"></div>
                    <span class="particle" style="--a:15deg;--r:150px;--z:42px;--p:18px;--c:var(--aqua)"></span>
                    <span class="particle" style="--a:57deg;--r:205px;--z:-30px;--p:10px;--c:var(--amber)"></span>
                    <span class="particle" style="--a:103deg;--r:170px;--z:70px;--p:24px;--c:var(--teal)"></span>
                    <span class="particle" style="--a:142deg;--r:230px;--z:-80px;--p:9px;--c:var(--gold)"></span>
                    <span class="particle" style="--a:194deg;--r:165px;--z:20px;--p:20px;--c:var(--aqua)"></span>
                    <span class="particle" style="--a:238deg;--r:225px;--z:-60px;--p:12px;--c:var(--teal)"></span>
                    <span class="particle" style="--a:281deg;--r:145px;--z:52px;--p:16px;--c:var(--gold)"></span>
                    <span class="particle" style="--a:322deg;--r:255px;--z:-90px;--p:8px;--c:var(--amber)"></span>
                  </div>
                  <span class="label strong" style="--x:-28px;--y:72px">Steward Core</span>
                  <span class="label" style="--x:150px;--y:-10px">Current Context</span>
                  <span class="label" style="--x:105px;--y:80px">Reasoning</span>
                  <span class="label" style="--x:-145px;--y:58px">Skills</span>
                  <span class="label" style="--x:-250px;--y:16px">Tools</span>
                  <span class="label" style="--x:168px;--y:-108px">Kubernetes</span>
                  <span class="label" style="--x:390px;--y:-30px">GitOps</span>
                  <span class="label" style="--x:106px;--y:120px">Monitoring</span>
                  <span class="label" style="--x:-425px;--y:65px">Search</span>
                  <span class="label" style="--x:-485px;--y:-24px">Home Automation</span>
                  <span class="label" style="--x:520px;--y:-86px">Docs</span>
                  <span class="label" style="--x:545px;--y:54px">Backups</span>
                </div>
                <div class="inspector">
                  <h3>Selected · Memory Ring</h3>
                  <div class="kv">
                    <span>Confidence</span><b>92%</b>
                    <span>Last learned</span><b>10 min ago</b>
                    <span>Sources</span><b>roadmap.md, Argo events</b>
                    <span>Linked skills</span><b>cluster-status, gitops</b>
                    <span>Trust</span><b>High</b>
                  </div>
                </div>
              </div>

              <div class="cards">
                <article class="card"><span class="status">Healthy</span><h3>Kubernetes Cluster</h3><p>4/4 nodes ready</p><div class="bar"><span style="width:42%"></span></div><p>CPU 42%</p><div class="bar"><span style="width:61%"></span></div><p>Memory 61%</p><p>Argo CD synced · 8f3a1c2</p></article>
                <article class="card"><span class="status">Running</span><h3>AI Runtime</h3><p>Ollama active</p><p>qwen2.5-coder loaded</p><p>3 models installed</p><p>Search connected</p></article>
                <article class="card"><span class="status">Healthy</span><h3>Observability</h3><p>Grafana healthy</p><p>Prometheus · 214 targets</p><p>Loki · 1.2M lines/min</p><p>Last alert auto-resolved</p></article>
                <article class="card"><span class="status">Secure</span><h3>Security / Identity</h3><p>Authentik online</p><p>Sealed Secrets healthy</p><p>cert-manager · 12 certs valid</p></article>
                <article class="card"><span class="status" style="color:var(--amber)">Planned</span><h3>Home Automation</h3><p>Home Assistant pending deploy</p><p>0 devices paired yet</p><p>Rollout targeted Q3 2026</p></article>
              </div>

              <div class="timeline">
                <div class="timeline-card"><span style="color:var(--teal)">09:41</span><br />Git commit pushed to homelab-infra</div>
                <div class="timeline-card"><span style="color:var(--teal)">09:42</span><br />Argo CD synced homepage</div>
                <div class="timeline-card"><span style="color:var(--aqua)">10:15</span><br />Steward memory updated</div>
                <div class="timeline-card"><span style="color:var(--teal)">10:20</span><br />Backup job completed</div>
                <div class="timeline-card"><span style="color:var(--amber)">11:30</span><br />Notice: high memory auto-resolved</div>
              </div>
            </section>

            <section id="ai-core" class="screen">
              <div class="panel">
                <div class="panel-head"><h1 class="panel-title">AI Core Detail — inside Steward's mind</h1><div class="subtle">memory, reasoning, tools and trust, all at once</div></div>
