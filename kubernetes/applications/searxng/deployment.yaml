apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      nodeSelector:
        homelab.sirnotethan.uk/workload: ai
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SEARXNG_BASE_URL
              value: https://search.apps.lab.sirnotethan.uk/
            - name: SEARXNG_BIND_ADDRESS
              value: "0.0.0.0"
            - name: SEARXNG_PORT
              value: "8080"
            - name: SEARXNG_LIMITER
              value: "false"
            - name: SEARXNG_PUBLIC_INSTANCE
              value: "false"
            - name: SEARXNG_IMAGE_PROXY
              value: "true"
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secrets
                  key: SEARXNG_SECRET
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
            - name: cache
              mountPath: /var/cache/searxng
      volumes:
        - name: config
          configMap:
            name: searxng-config
        - name: cache
          emptyDir: {}
